            <br />

        <script>
            // ====================== SMOOTH ANIMATION BOTH DIRECTIONS ======================
            const langToggle = document.getElementById("langToggle");
            const slider = langToggle.querySelector(".slider");

            const isChinesePage =
                window.location.href.includes("index_zh.html");

            function initToggle() {
                const enOption = langToggle.querySelector('[data-lang="en"]');
                const zhOption = langToggle.querySelector('[data-lang="zh"]');

                // 1. Instantly set starting position (opposite side) — no animation yet
                slider.style.transition = "none";

                if (isChinesePage) {
                    langToggle.classList.add("chinese");
                    zhOption.classList.add("active");
                    enOption.classList.remove("active");
                } else {
                    langToggle.classList.remove("chinese");
                    enOption.classList.add("active");
                    zhOption.classList.remove("active");
                }

                // 2. Tiny delay → re-enable animation so it slides in
                setTimeout(() => {
                    slider.style.transition =
                        "left 0.4s cubic-bezier(0.4, 0, 0.2, 1)";
                }, 30);
            }

            // Click = switch page
            langToggle.addEventListener("click", () => {
                window.location.href = isChinesePage
                    ? "index.html"
                    : "index_zh.html";
            });

            initToggle();
        </script>
